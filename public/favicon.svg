<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#c8141f"/>
      <stop offset="0.7" stop-color="#9a0d16"/>
      <stop offset="1" stop-color="#5a060c"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="0.5" stop-color="#e8b94c"/>
      <stop offset="1" stop-color="#b07f23"/>
    </linearGradient>
    <linearGradient id="ji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5d6"/>
      <stop offset="0.55" stop-color="#ffd66a"/>
      <stop offset="1" stop-color="#d9a83a"/>
    </linearGradient>
  </defs>
  <!-- 紅金圓牌 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#ring)" stroke-width="3.5"/>
  <circle cx="32" cy="32" r="25.5" fill="none" stroke="rgba(255,214,120,.35)" stroke-width="1"/>
  <!-- 乩字 -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
    font-family="'Noto Serif TC','Songti TC',serif" font-weight="900" font-size="38"
